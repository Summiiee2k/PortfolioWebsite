<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sumedh Bamane — Portfolio</title>
    <link rel="stylesheet" href="./styles/main.css" />
</head>

<body>

    <div id="game-container"></div>

    <!-- Project overlay -->
    <div id="project-screen">
        <div class="project-card" id="project-card-content"></div>
    </div>

    <!-- D-pad -->
    <div id="dpad">
        <div class="dpad-btn" id="btn-up">▲</div>
        <div class="dpad-btn" id="btn-left">◀</div>
        <div class="dpad-btn" id="btn-down">▼</div>
        <div class="dpad-btn" id="btn-right">▶</div>
    </div>

    <!-- Phaser via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <!-- Main entry — ES module -->
    <script type="module">
        import { BootScene } from './src/scenes/BootScene.js';
        import { WorldScene } from './src/scenes/WorldScene.js';

        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'game-container',
            backgroundColor: '#050510',
            scale: {
                mode: Phaser.Scale.RESIZE,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 700 }, debug: false }
            },
            scene: [BootScene, WorldScene]
        };

        new Phaser.Game(config);
    </script>

</body>

</html>
