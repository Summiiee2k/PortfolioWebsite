<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sumedh Bamane — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles/main.css" />
    <meta property="og:title" content="Sumedh Bamane — Interactive Portfolio" />
    <meta property="og:description"
        content="An AI Engineer's portfolio — as a Mario-style platformer game. Walk through my experience, projects and skills." />
    <meta property="og:image" content="https://summiiee2k.github.io/PortfolioWebsite/assets/images/preview.png" />
    <meta property="og:url" content="https://summiiee2k.github.io/PortfolioWebsite" />
    <meta name="twitter:card" content="summary_large_image" />
</head>

<body>

    <div id="game-container"></div>

    <!-- Project overlay -->
    <div id="project-screen">
        <div class="project-card" id="project-card-content"></div>
    </div>

    <!-- D-pad -->
    <div id="dpad">
        <div class="dpad-btn" id="btn-up">▲</div>
        <div class="dpad-btn" id="btn-left">◀</div>
        <div class="dpad-btn" id="btn-down">▼</div>
        <div class="dpad-btn" id="btn-right">▶</div>
    </div>
    <div id="expand-screen">
        <div class="expand-card" id="expand-content"></div>
    </div>

    <!-- Phaser via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <!-- Main entry — ES module -->
    <script type="module">
        import { BootScene } from './src/scenes/BootScene.js';
        import { WorldScene } from './src/scenes/WorldScene.js';

        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'game-container',
            backgroundColor: '#050510',
            scale: {
                mode: Phaser.Scale.RESIZE,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 700 }, debug: false }
            },
            scene: [BootScene, WorldScene]
        };

        new Phaser.Game(config);
    </script>
    <div id="rotate-msg">
        <div class="rotate-inner">
            <div style="font-size:48px">📱↔️</div>
            <p>ROTATE YOUR PHONE</p>
            <p style="font-size:8px;color:#556677;margin-top:12px">
                THIS GAME PLAYS BEST<br>IN LANDSCAPE MODE
            </p>
        </div>
    </div>

</body>

</html>
