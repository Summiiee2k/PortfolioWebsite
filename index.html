    <!-- game bootstrap -->
    <script type="module">
        import { BootScene } from './src/scenes/BootScene.js';
        import { WorldScene } from './src/scenes/WorldScene.js';

        // Use clientWidth/Height — excludes browser chrome reliably
        const W = document.documentElement.clientWidth;
        const H = document.documentElement.clientHeight;

        const config = {
            type: Phaser.AUTO,
            width: W,
            height: H,
            parent: 'game-container',
            backgroundColor: '#050510',
            scale: {
                mode: Phaser.Scale.RESIZE,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                width: W,
                height: H,
            },
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 700 }, debug: false },
            },
            scene: [BootScene, WorldScene],
        };

        new Phaser.Game(config);
    </script>
    <script data-goatcounter="https://summiiee2k.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

    <p class="visitor-count"
        style="position: absolute; bottom: 20px; right: 20px; color: #00ffcc; font-family: 'Press Start 2P', monospace; font-size: 10px; z-index: 9999; text-shadow: 2px 2px 0px #000;">
        Total Profile Views: <span id="stats">Loading...</span>
    </p>

    <script>
        var request = new XMLHttpRequest();
        request.addEventListener("load", function () {
            // Check if GoatCounter successfully found the view count (Status 200)
            if (this.status === 200) {
                try {
                    document.getElementById("stats").innerText = JSON.parse(this.responseText).count;
                } catch (e) {
                    document.getElementById("stats").innerText = "1";
                }
            } else {
                // If GoatCounter returns a 404 because there are no views yet, default to 1
                document.getElementById("stats").innerText = "1";
            }
        });

        // Automatically grabs your exact GitHub Pages subfolder path
        var currentPath = encodeURIComponent(location.pathname);

        request.open("GET", "https://summiiee2k.goatcounter.com/counter/" + currentPath + ".json");
        request.send();
    </script>
